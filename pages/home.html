<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="WorkFinder — Explore projetos e oportunidades freelance disponíveis." />
  <title>Explorar Projetos — WorkFinder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/home.css" />
</head>

<body>

  <!-- ── Navbar ── -->
  <nav class="navbar">
    <a href="home.html" class="nav-brand">
      <div class="nav-logo">WF</div>
      WorkFinder
    </a>

    <div class="nav-search">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="m21 21-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0Z" />
      </svg>
      <input type="text" id="search-input" placeholder="Buscar projetos, habilidades..." />
    </div>

    <div class="nav-actions" id="nav-actions-home">
      <button class="btn-nav btn-nav-ghost" onclick="window.location.href='perfil-freelancer.html'">Meu Perfil</button>
      <button class="btn-nav btn-nav-ghost" onclick="location.href='propostas.html'">Propostas</button>
      <button class="btn-nav btn-nav-ghost" onclick="location.href='contratos.html'">Contratos</button>
      <div class="avatar" id="avatar-home" onclick="window.location.href='perfil-freelancer.html'" title="Ver perfil">MV</div>
    </div>
  </nav>

  <!-- ── Hero ── -->
  <div class="hero">
    <div class="hero-eyebrow">Oportunidades disponíveis</div>
    <h1>Encontre seu próximo projeto</h1>
    <p>Conectamos freelancers talentosos às melhores empresas. Explore projetos e envie sua proposta.</p>
    <div class="hero-stats">
      <div class="hero-stat">
        <div class="hero-stat-num">128</div>
        <div class="hero-stat-label">projetos abertos</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-num">47</div>
        <div class="hero-stat-label">novos esta semana</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-num">R$180</div>
        <div class="hero-stat-label">média por hora</div>
      </div>
    </div>
  </div>

  <!-- ── Layout ── -->
  <div class="main-layout">

    <!-- Sidebar de filtros -->
    <aside class="sidebar">
      <div class="sidebar-card">
        <div class="sidebar-title">Filtros</div>

        <div class="filter-group">
          <span class="filter-label">Modalidade</span>
          <div class="filter-options">
            <label class="filter-opt">
              <input type="checkbox" data-filter="modalidade" value="remoto" checked /> Remoto <span class="count" data-count-modal="remoto">–</span>
            </label>
            <label class="filter-opt">
              <input type="checkbox" data-filter="modalidade" value="presencial" checked /> Presencial <span class="count" data-count-modal="presencial">–</span>
            </label>
            <label class="filter-opt">
              <input type="checkbox" data-filter="modalidade" value="hibrido" checked /> Híbrido <span class="count" data-count-modal="hibrido">–</span>
            </label>
          </div>
        </div>

        <div class="filter-group">
          <span class="filter-label">Tipo</span>
          <div class="filter-options">
            <label class="filter-opt">
              <input type="checkbox" data-filter="tipo" value="projeto" checked /> Projeto pontual <span class="count" data-count-tipo="projeto">–</span>
            </label>
            <label class="filter-opt">
              <input type="checkbox" data-filter="tipo" value="freelance" checked /> Freelance <span class="count" data-count-tipo="freelance">–</span>
            </label>
            <label class="filter-opt">
              <input type="checkbox" data-filter="tipo" value="part-time" checked /> Part-time <span class="count" data-count-tipo="part-time">–</span>
            </label>
          </div>
        </div>

        <div class="filter-group">
          <span class="filter-label">Área</span>
          <div class="filter-options">
            <label class="filter-opt">
              <input type="checkbox" data-filter="area" value="Desenvolvimento Web" checked /> Dev Web <span class="count" data-count-area="Desenvolvimento Web">–</span>
            </label>
            <label class="filter-opt">
              <input type="checkbox" data-filter="area" value="Design Grafico / UI/UX" checked /> Design UI/UX <span class="count" data-count-area="Design Grafico / UI/UX">–</span>
            </label>
            <label class="filter-opt">
              <input type="checkbox" data-filter="area" value="Desenvolvimento Mobile" checked /> Mobile <span class="count" data-count-area="Desenvolvimento Mobile">–</span>
            </label>
            <label class="filter-opt">
              <input type="checkbox" data-filter="area" value="Dados / BI" checked /> Dados / BI <span class="count" data-count-area="Dados / BI">–</span>
            </label>
            <label class="filter-opt">
              <input type="checkbox" data-filter="area" value="Marketing" checked /> Marketing <span class="count" data-count-area="Marketing">–</span>
            </label>
          </div>
        </div>
      </div>

      <div class="sidebar-card">
        <div class="sidebar-title">Orçamento</div>
        <div class="filter-options">
          <label class="filter-opt"><input type="radio" name="budget" value="0,999999" checked onchange="aplicarBudget(this)"/> Qualquer valor</label>
          <label class="filter-opt"><input type="radio" name="budget" value="0,2000" onchange="aplicarBudget(this)"/> Até R$ 2.000</label>
          <label class="filter-opt"><input type="radio" name="budget" value="2000,10000" onchange="aplicarBudget(this)"/> R$ 2k – R$ 10k</label>
          <label class="filter-opt"><input type="radio" name="budget" value="10000,30000" onchange="aplicarBudget(this)"/> R$ 10k – R$ 30k</label>
          <label class="filter-opt"><input type="radio" name="budget" value="30000,999999" onchange="aplicarBudget(this)"/> Acima de R$ 30k</label>
        </div>
      </div>
    </aside>

    <!-- Feed principal -->
    <main>
      <div class="feed-header">
        <span class="feed-title" id="feed-count">Carregando...</span>
        <div class="feed-sort">
          Ordenar por
          <select id="sort-select" onchange="filtroOrdem=this.value;renderFeed()">
            <option value="recentes">Mais recentes</option>
            <option value="orcamento">Maior orçamento</option>
            <option value="propostas">Menos concorrência</option>
          </select>
        </div>
      </div>

      <!-- Chips de categoria rápida -->
      <div class="chips">
        <button class="chip active" onclick="filterChip(this, 'todos')">Todos</button>
        <button class="chip" onclick="filterChip(this, 'Dev Web')">Dev Web</button>
        <button class="chip" onclick="filterChip(this, 'Design')">Design UI/UX</button>
        <button class="chip" onclick="filterChip(this, 'Mobile')">Mobile</button>
        <button class="chip" onclick="filterChip(this, 'Dados')">Dados / BI</button>
        <button class="chip" onclick="filterChip(this, 'Marketing')">Marketing</button>
        <button class="chip" onclick="filterChip(this, 'DevOps')">DevOps</button>
      </div>

      <!-- Cards dos projetos -->
      <div class="project-grid" id="project-grid"></div>

      <!-- Paginação -->
      <div class="pagination">
        <button class="page-btn active">1</button>
        <button class="page-btn">2</button>
        <button class="page-btn">3</button>
        <button class="page-btn">›</button>
      </div>
    </main>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/home.js"></script>
</body>

</html>
