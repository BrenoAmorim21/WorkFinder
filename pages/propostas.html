<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minhas Propostas — WorkFinder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/style.css" />
    <style>
        :root {
            --brand: #1A56DB;
            --brand-soft: #EBF2FF;
            --brand-dark: #1039A0;
            --green: #059669;
            --green-soft: #D1FAE5;
            --amber: #D97706;
            --amber-soft: #FEF3C7;
            --red: #DC2626;
            --red-soft: #FEE2E2;
            --ink: #0E1726;
            --ink-mid: #4A5568;
            --ink-light: #718096;
            --border: #E2E8F0;
            --surface: #F7F9FC;
            --white: #fff;
            --font: 'DM Sans', sans-serif
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: var(--font);
            background: var(--surface);
            color: var(--ink);
            min-height: 100vh
        }

        a {
            color: inherit;
            text-decoration: none
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: #fff;
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: .6rem;
            font-weight: 600;
            font-size: 1.1rem
        }

        .nav-logo {
            width: 32px;
            height: 32px;
            background: var(--brand);
            color: #fff;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .78rem;
            font-weight: 700
        }

        .btn-nav {
            padding: .42rem 1rem;
            border-radius: 8px;
            font-family: var(--font);
            font-size: .875rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: .18s
        }

        .btn-nav-ghost {
            background: none;
            color: var(--ink-mid)
        }

        .btn-nav-ghost:hover {
            background: var(--surface)
        }

        .btn-nav-danger {
            background: none;
            color: var(--red)
        }

        .btn-nav-danger:hover {
            background: var(--red-soft)
        }

        .page-wrap {
            max-width: 860px;
            margin: 0 auto;
            padding: 2rem 1.5rem
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: .25rem
        }

        .page-sub {
            font-size: .9rem;
            color: var(--ink-mid);
            margin-bottom: 1.75rem
        }

        .mini-stats {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.75rem;
            flex-wrap: wrap
        }

        .mini-stat {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: .9rem 1.25rem;
            display: flex;
            align-items: center;
            gap: .75rem;
            flex: 1;
            min-width: 130px
        }

        .mini-stat-icon {
            width: 34px;
            height: 34px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .95rem
        }

        .mini-stat-num {
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1
        }

        .mini-stat-label {
            font-size: .75rem;
            color: var(--ink-mid);
            margin-top: .1rem
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1.5rem
        }

        .tab {
            padding: .7rem 1rem;
            font-size: .875rem;
            font-weight: 500;
            color: var(--ink-mid);
            cursor: pointer;
            border: none;
            border-bottom: 2px solid transparent;
            background: none;
            transition: .18s;
            white-space: nowrap;
            font-family: var(--font);
            display: flex;
            align-items: center;
            gap: .4rem
        }

        .tab:hover {
            color: var(--brand)
        }

        .tab.active {
            color: var(--brand);
            border-bottom-color: var(--brand)
        }

        .tab-count {
            font-size: .72rem;
            font-weight: 600;
            padding: .1rem .4rem;
            border-radius: 5px;
            background: var(--surface)
        }

        .tab.active .tab-count {
            background: var(--brand-soft);
            color: var(--brand)
        }

        .prop-list {
            display: flex;
            flex-direction: column;
            gap: 1rem
        }

        .prop-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.4rem;
            transition: .2s;
            cursor: pointer;
            animation: fadeUp .3s ease both
        }

        .prop-card:hover {
            box-shadow: 0 4px 16px rgba(14, 23, 38, .08);
            transform: translateY(-1px)
        }

        .prop-card.aceita {
            border-left: 3px solid var(--green)
        }

        .prop-card.recusada {
            border-left: 3px solid var(--red);
            opacity: .8
        }

        .prop-card.cancelada {
            opacity: .6
        }

        .prop-card:nth-child(1) {
            animation-delay: .04s
        }

        .prop-card:nth-child(2) {
            animation-delay: .08s
        }

        .prop-card:nth-child(3) {
            animation-delay: .12s
        }

        .timeline {
            display: flex;
            align-items: center;
            gap: 0;
            margin-bottom: .85rem
        }

        .tl-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .65rem;
            font-weight: 700;
            flex-shrink: 0
        }

        .tl-dot.done {
            background: var(--brand);
            color: #fff
        }

        .tl-dot.current {
            background: var(--amber);
            color: #fff
        }

        .tl-dot.pending {
            background: var(--border);
            color: var(--ink-light)
        }

        .tl-line {
            width: 28px;
            height: 2px
        }

        .tl-line.done {
            background: var(--brand)
        }

        .tl-line.pending {
            background: var(--border)
        }

        .tl-label {
            margin-left: .6rem;
            font-size: .75rem;
            color: var(--ink-mid)
        }

        .prop-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: .5rem
        }

        .prop-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--ink)
        }

        .prop-empresa {
            font-size: .83rem;
            color: var(--ink-mid)
        }

        .badge {
            font-size: .7rem;
            font-weight: 600;
            padding: .22rem .65rem;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: .3px;
            white-space: nowrap;
            flex-shrink: 0
        }

        .badge-pendente {
            background: var(--amber-soft);
            color: var(--amber)
        }

        .badge-aceita {
            background: var(--green-soft);
            color: var(--green)
        }

        .badge-recusada {
            background: var(--red-soft);
            color: var(--red)
        }

        .badge-cancelada {
            background: var(--surface);
            color: var(--ink-light)
        }

        .prop-msg {
            font-size: .855rem;
            color: var(--ink-mid);
            line-height: 1.6;
            margin-bottom: .9rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden
        }

        .prop-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: .5rem
        }

        .prop-meta {
            display: flex;
            align-items: center;
            gap: .85rem;
            flex-wrap: wrap
        }

        .prop-valor {
            font-size: .95rem;
            font-weight: 600;
            color: var(--green)
        }

        .prop-info {
            font-size: .8rem;
            color: var(--ink-light)
        }

        .btn-sm {
            padding: .38rem .8rem;
            border-radius: 7px;
            font-family: var(--font);
            font-size: .78rem;
            font-weight: 500;
            cursor: pointer;
            border: 1.5px solid var(--border);
            background: #fff;
            color: var(--ink-mid);
            transition: .18s
        }

        .btn-sm:hover {
            border-color: var(--brand);
            color: var(--brand)
        }

        .btn-sm-danger {
            color: var(--red)
        }

        .btn-sm-danger:hover {
            border-color: var(--red);
            background: var(--red-soft)
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--ink-light)
        }

        .empty-icon {
            font-size: 2.5rem;
            margin-bottom: .5rem
        }

        .btn-explore {
            margin-top: 1rem;
            padding: .6rem 1.25rem;
            background: var(--brand);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: var(--font);
            font-size: .875rem;
            font-weight: 500;
            cursor: pointer
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--ink-light)
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(14, 23, 38, .45);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all
        }

        .modal {
            background: #fff;
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 8px 32px rgba(14, 23, 38, .15);
            transform: translateY(20px);
            transition: transform .25s;
            max-height: 85vh;
            overflow-y: auto
        }

        .modal-overlay.open .modal {
            transform: translateY(0)
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.25rem
        }

        .modal-title {
            font-size: 1.05rem;
            font-weight: 700;
            line-height: 1.35
        }

        .btn-close {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--ink-light);
            padding: .2rem;
            border-radius: 6px
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: .6rem 0;
            border-bottom: 1px solid var(--border);
            font-size: .875rem
        }

        .detail-row:last-child {
            border-bottom: none
        }

        .detail-key {
            color: var(--ink-mid);
            font-weight: 500
        }

        .detail-msg-box {
            font-size: .875rem;
            color: var(--ink-mid);
            line-height: 1.7;
            margin-top: .75rem;
            padding: .9rem;
            background: var(--surface);
            border-radius: 8px;
            font-style: italic
        }

        .modal-footer {
            margin-top: 1.25rem;
            display: flex;
            gap: .6rem;
            justify-content: flex-end
        }

        .btn-cancel-prop {
            padding: .55rem 1.1rem;
            background: none;
            border: 1.5px solid var(--red-soft);
            border-radius: 8px;
            font-family: var(--font);
            font-size: .875rem;
            color: var(--red);
            cursor: pointer
        }

        .btn-cancel-prop:hover {
            background: var(--red-soft)
        }

        .btn-fechar-modal {
            padding: .55rem 1.2rem;
            background: var(--brand);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: var(--font);
            font-size: .875rem;
            cursor: pointer
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(14px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        /* ============ MOBILE ============ */
        @media (max-width: 768px) {

            html,
            body {
                overflow-x: hidden;
            }

            body>*,
            main,
            .container,
            .page-wrap {
                max-width: 100%;
            }

            body>* {
                min-width: 0;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a href="home.html" class="nav-brand" id="nav-home-link">
            <div class="nav-logo">WF</div>
            WorkFinder
        </a>
        <div id="nav-notif-slot" style="display:flex;align-items:center;margin-left:auto"></div>
        <button class="nav-hamburger" onclick="document.querySelector('.nav-actions').classList.toggle('open')"
            aria-label="Menu">☰</button>
        <div class="nav-actions">
            <button class="btn-nav btn-nav-ghost" id="btn-nav-1"></button>
            <button class="btn-nav btn-nav-ghost" id="btn-nav-2"></button>
            <button class="btn-nav btn-nav-danger" onclick="sair()">Sair</button>
        </div>
    </nav>

    <div class="page-wrap">
        <div class="page-title">Minhas Propostas</div>
        <div class="page-sub">Acompanhe o status em tempo real — dados direto do banco</div>

        <div class="mini-stats">
            <div class="mini-stat">
                <div class="mini-stat-icon" style="background:var(--amber-soft)">⏳</div>
                <div>
                    <div class="mini-stat-num" id="count-pendente" style="color:var(--amber)">–</div>
                    <div class="mini-stat-label">Pendentes</div>
                </div>
            </div>
            <div class="mini-stat">
                <div class="mini-stat-icon" style="background:var(--green-soft)">✅</div>
                <div>
                    <div class="mini-stat-num" id="count-aceita" style="color:var(--green)">–</div>
                    <div class="mini-stat-label">Aceitas</div>
                </div>
            </div>
            <div class="mini-stat">
                <div class="mini-stat-icon" style="background:var(--red-soft)">❌</div>
                <div>
                    <div class="mini-stat-num" id="count-recusada" style="color:var(--red)">–</div>
                    <div class="mini-stat-label">Recusadas</div>
                </div>
            </div>
            <div class="mini-stat">
                <div class="mini-stat-icon" style="background:var(--surface)">📊</div>
                <div>
                    <div class="mini-stat-num" id="count-total">–</div>
                    <div class="mini-stat-label">Total</div>
                </div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="setTab(this,'todas')">Todas <span class="tab-count"
                    id="tc-todas">0</span></button>
            <button class="tab" onclick="setTab(this,'pendente')">Pendentes <span class="tab-count"
                    id="tc-pendente">0</span></button>
            <button class="tab" onclick="setTab(this,'aceita')">Aceitas <span class="tab-count"
                    id="tc-aceita">0</span></button>
            <button class="tab" onclick="setTab(this,'recusada')">Recusadas <span class="tab-count"
                    id="tc-recusada">0</span></button>
        </div>

        <div class="prop-list" id="prop-list">
            <div class="loading">Carregando propostas...</div>
        </div>
    </div>

    <!-- Modal detalhe -->
    <div class="modal-overlay" id="modal-detail" onclick="if(event.target===this)fecharModal('modal-detail')">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="detail-titulo">–</div>
                <button class="btn-close" onclick="fecharModal('modal-detail')">✕</button>
            </div>
            <div id="detail-rows"></div>
            <div class="detail-msg-box" id="detail-msg"></div>
            <div class="modal-footer">
                <button class="btn-cancel-prop" id="btn-cancelar" onclick="cancelarProposta()">Cancelar
                    proposta</button>
                <button class="btn-fechar-modal" onclick="fecharModal('modal-detail')">Fechar</button>
            </div>
        </div>
    </div>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/propostas.js"></script>
</body>

</html>
